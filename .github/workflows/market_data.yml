name: Fetch Market Data

on:
  schedule:
    # Every 15 minutes, Mon-Fri, 9:00am-4:30pm ET (13:00-20:30 UTC)
    # 15-min interval keeps us under Twelve Data's 800 calls/day free limit
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch All Market Data
        env:
          TWELVE_API_KEY: ${{ secrets.TWELVE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 - <<PYEOF
          import urllib.request
          import json
          import datetime
          import os

          twelve_key = os.environ.get("TWELVE_API_KEY", "")
          fred_key = os.environ.get("FRED_API_KEY", "")

          def fetch(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.loads(r.read())
              except Exception as e:
                  return {"error": str(e)}

          def fetch_text(url):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return r.read().decode("utf-8")
              except Exception as e:
                  return ""

          def latest_value(response, sym=None):
              # Handles both single and batch responses
              if sym and sym in response:
                  r = response[sym]
                  if "values" in r and r["values"]:
                      return r["values"][0].get("value", "N/A")
                  return r.get("value", "error")
              if "values" in response and response["values"]:
                  return response["values"][0].get("value", "N/A")
              return response.get("value", "error")

          base = "https://api.twelvedata.com"
          data = {}

          # ── SECTION 1: TECHNICAL INDICATORS (Twelve Data batch requests) ──
          # Core symbols only — batch requests use 1 credit per symbol
          # 5 symbols × 6 endpoints = 30 credits per run
          # 26 runs/day (every 15 min × 6.5 hrs) × 30 = 780 credits < 800 limit
          core_symbols = ["NVDA", "AMD", "SPY", "XLK", "META"]
          sym_str = ",".join(core_symbols)

          print(f"Fetching batch technical data for: {sym_str}")

          # Batch fetch each indicator
          batch_ema9   = fetch(f"{base}/ema?symbol={sym_str}&interval=5min&time_period=9&apikey={twelve_key}")
          batch_ema20  = fetch(f"{base}/ema?symbol={sym_str}&interval=5min&time_period=20&apikey={twelve_key}")
          batch_vwap   = fetch(f"{base}/vwap?symbol={sym_str}&interval=5min&apikey={twelve_key}")
          batch_atr    = fetch(f"{base}/atr?symbol={sym_str}&interval=5min&time_period=14&apikey={twelve_key}")
          batch_rsi    = fetch(f"{base}/rsi?symbol={sym_str}&interval=5min&time_period=14&apikey={twelve_key}")
          batch_series = fetch(f"{base}/time_series?symbol={sym_str}&interval=5min&outputsize=20&apikey={twelve_key}")

          for sym in core_symbols:
              result = {}

              # Extract from batch responses (batch returns dict keyed by symbol)
              result["ema9"]  = latest_value(batch_ema9,   sym)
              result["ema20"] = latest_value(batch_ema20,  sym)
              result["vwap"]  = latest_value(batch_vwap,   sym)
              result["atr"]   = latest_value(batch_atr,    sym)
              result["rsi"]   = latest_value(batch_rsi,    sym)

              # RVOL from time series
              series_data = batch_series.get(sym, {}) if isinstance(batch_series, dict) else batch_series
              if "values" in series_data and series_data["values"]:
                  bars = series_data["values"]
                  current_vol = float(bars[0].get("volume", 0))
                  avg_vol = sum(float(b.get("volume", 0)) for b in bars[1:]) / max(len(bars)-1, 1)
                  result["rvol"] = round(current_vol / avg_vol, 2) if avg_vol > 0 else "N/A"
                  result["current_price"] = bars[0].get("close", "N/A")
                  result["current_volume"] = current_vol
                  result["avg_volume_5min"] = round(avg_vol, 0)
                  try:
                      tp_vol = sum((float(b["high"])+float(b["low"])+float(b["close"]))/3*float(b["volume"]) for b in bars)
                      total_vol = sum(float(b["volume"]) for b in bars)
                      result["vwap_calculated"] = round(tp_vol/total_vol, 4) if total_vol > 0 else "N/A"
                  except:
                      result["vwap_calculated"] = "N/A"
              else:
                  result["rvol"] = "N/A"
                  result["current_price"] = "N/A"
                  result["vwap_calculated"] = "N/A"

              # EMA signal
              try:
                  e9, e20 = float(result["ema9"]), float(result["ema20"])
                  result["ema_signal"] = "BULLISH" if e9 > e20 else "BEARISH"
                  result["ema_spread"] = round(e9 - e20, 4)
              except:
                  result["ema_signal"] = "N/A"
                  result["ema_spread"] = "N/A"

              # VWAP position
              try:
                  price = float(result["current_price"])
                  vwap  = float(result["vwap"])
                  result["vwap_position"] = "ABOVE" if price > vwap else "BELOW"
                  result["vwap_distance_pct"] = round((price - vwap) / vwap * 100, 2)
              except:
                  result["vwap_position"] = "N/A"
                  result["vwap_distance_pct"] = "N/A"

              data[sym] = result
              print(f"  {sym}: price={result.get('current_price')} ema={result.get('ema_signal')} rvol={result.get('rvol')}")

          # ── SECTION 2: MACRO DATA (FRED) ──────────────────────────────────
          print("Fetching FRED macro data...")
          macro = {}
          fred_series = {
              "vix": "VIXCLS",
              "treasury_10y": "DGS10",
              "fed_funds_rate": "DFF",
              "breakeven_inflation": "T10YIE"
          }
          for key, series_id in fred_series.items():
              r = fetch(f"https://api.stlouisfed.org/fred/series/observations?series_id={series_id}&api_key={fred_key}&file_type=json&limit=1&sort_order=desc")
              if "observations" in r and r["observations"]:
                  obs = r["observations"][0]
                  macro[key] = {"value": obs.get("value","N/A"), "date": obs.get("date","N/A")}
              else:
                  macro[key] = {"value": "N/A", "date": "N/A"}

          try:
              vix_val = float(macro["vix"]["value"])
              macro["vix_regime"] = "CALM" if vix_val < 15 else "NORMAL" if vix_val < 20 else "ELEVATED" if vix_val < 25 else "HIGH" if vix_val < 35 else "CRISIS"
          except:
              macro["vix_regime"] = "N/A"

          data["_macro"] = macro
          print(f"  VIX: {macro['vix']['value']} ({macro['vix_regime']})")

          # ── SECTION 3: CNN FEAR & GREED ────────────────────────────────────
          print("Fetching Fear & Greed...")
          try:
              fg = json.loads(fetch_text("https://production.dataviz.cnn.io/index/fearandgreed/graphdata"))
              fg_score = float(fg.get("fear_and_greed", {}).get("score", 0))
              fg_rating = fg.get("fear_and_greed", {}).get("rating", "N/A")
              data["_sentiment"] = {
                  "fear_greed_score": round(fg_score, 1),
                  "fear_greed_rating": fg_rating,
                  "signal": "BEARISH_CAUTION" if fg_score > 75 else ("BULLISH_OPPORTUNITY" if fg_score < 25 else "NEUTRAL")
              }
              print(f"  Fear & Greed: {fg_score} ({fg_rating})")
          except Exception as e:
              data["_sentiment"] = {"fear_greed_score": "N/A", "fear_greed_rating": "N/A", "signal": "N/A"}
              print(f"  Fear & Greed error: {e}")

          # ── SECTION 4: CONGRESS TRADES (Quiver Quantitative) ──────────────
          print("Fetching Congress trades...")
          try:
              cong = json.loads(fetch_text("https://api.quiverquant.com/beta/live/congresstrading"))
              purchases = [t for t in cong[:50] if t.get("Transaction","").lower() in ["purchase","buy"]][:10]
              data["_congress"] = {
                  "recent_purchases": [{"ticker": t.get("Ticker","N/A"), "representative": t.get("Representative","N/A"), "amount": t.get("Amount","N/A"), "date": t.get("TransactionDate","N/A"), "party": t.get("Party","N/A")} for t in purchases]
              }
              print(f"  Congress: {len(purchases)} recent purchases")
          except Exception as e:
              data["_congress"] = {"recent_purchases": [], "error": str(e)}
              print(f"  Congress error: {e}")

          # ── SECTION 5: SEC EDGAR 8-Ks ──────────────────────────────────────
          print("Fetching SEC EDGAR 8-Ks...")
          try:
              today = datetime.datetime.utcnow().strftime("%Y-%m-%d")
              edgar = json.loads(fetch_text(f"https://efts.sec.gov/LATEST/search-index?q=%228-K%22&forms=8-K&dateRange=custom&startdt={today}&enddt={today}"))
              hits = edgar.get("hits", {}).get("hits", [])[:15]
              data["_edgar"] = {
                  "latest_8k_count": len(hits),
                  "filings": [{"company": h.get("_source",{}).get("entity_name","N/A"), "filed": h.get("_source",{}).get("file_date","N/A")} for h in hits]
              }
              print(f"  EDGAR: {len(hits)} 8-Ks today")
          except Exception as e:
              data["_edgar"] = {"latest_8k_count": 0, "filings": [], "error": str(e)}
              print(f"  EDGAR error: {e}")

          # ── METADATA ───────────────────────────────────────────────────────
          now = datetime.datetime.utcnow()
          data["_meta"] = {
              "updated_utc": now.isoformat(),
              "updated_et": (now - datetime.timedelta(hours=4)).strftime("%Y-%m-%d %H:%M ET"),
              "source": "Twelve Data + FRED + CNN Fear&Greed + Quiver Congress + SEC EDGAR",
              "interval": "5min",
              "core_symbols": core_symbols,
              "api_calls_this_run": 30,
              "daily_limit": 800
          }

          with open("market_data.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"\nDone. {len(core_symbols)} symbols written at {now.strftime('%H:%M UTC')}")
          PYEOF

      - name: Commit and push
        run: |
          git config --global user.email "marketbot@trading.ai"
          git config --global user.name "Market Data Bot"
          git add market_data.json
          git diff --staged --quiet || git commit -m "Market data $(date -u '+%H:%M UTC')"
          git push
